<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quizzer - Results</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#00486a",
                        "surface-bright": "#f5faff",
                        "surface-container": "#eaeef3",
                        "surface-container-highest": "#dee3e8",
                        "on-tertiary-fixed": "#001e2f",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "on-secondary-container": "#186c79",
                        "outline": "#6e7980",
                        "surface-dim": "#d6dbdf",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#c9e6ff",
                        "surface-variant": "#dee3e8",
                        "on-secondary-fixed-variant": "#004e59",
                        "on-secondary-fixed": "#001f25",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#004c69",
                        "on-surface-variant": "#3e484f",
                        "inverse-on-surface": "#edf1f6",
                        "outline-variant": "#bdc8d1",
                        "secondary-container": "#a2ebfa",
                        "inverse-primary": "#7bd0ff",
                        "secondary-fixed-dim": "#89d2e0",
                        "background": "#f5faff",
                        "inverse-surface": "#2c3135",
                        "on-background": "#171c20",
                        "on-primary-container": "#004965",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e4e9ee",
                        "on-surface": "#171c20",
                        "primary-container": "#38bdf8",
                        "primary": "#00668a",
                        "surface-tint": "#00668a",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#a5eefd",
                        "surface-container-low": "#eff4f9",
                        "tertiary": "#006591",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#c4e7ff",
                        "surface": "#f5faff",
                        "tertiary-fixed-dim": "#89ceff",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#7bd0ff",
                        "secondary": "#0f6875",
                        "on-primary-fixed": "#001e2c",
                        "tertiary-container": "#43bbff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xs": "4px",
                        "sm": "8px",
                        "gutter": "20px",
                        "xl": "48px",
                        "md": "16px",
                        "unit": "4px",
                        "margin_safe": "24px"
                    },
                    "fontFamily": {
                        "h1": ["Manrope"],
                        "label-md": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "h2": ["Manrope"],
                        "display": ["Manrope"]
                    },
                    "fontSize": {
                        "h1": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],

                        "display": ["42px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #F8FAFC;
            color: #0F172A;
        }
        .glass-card {
            background: #FFFFFF;
            border: 1px solid rgba(15, 23, 42, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            filter: drop-shadow(0 2px 4px rgba(56,189,248,0.3));
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #38BDF8, #5FA8B6);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.25);
        }
        .btn-hover:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.35);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md antialiased pt-24 pb-12">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter py-md bg-[#F8FAFC]/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
<div class="flex items-center">
<span class="font-display text-h2 font-extrabold text-[#38BDF8]">Quizzer</span>
</div>
<div class="flex items-center gap-sm">
<button aria-label="Toggle Dark Mode" class="p-2 text-slate-500 hover:scale-105 hover:text-[#38BDF8] transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-h2">dark_mode</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-margin_safe w-full max-w-[600px] mx-auto">
<div class="w-full flex flex-col gap-lg">
<!-- Hero / Score Summary Card -->
<div class="glass-card rounded-xl p-xl flex flex-col items-center text-center relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-sky-100 rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-cyan-100 rounded-full blur-3xl"></div>
<h1 class="font-h1 text-h1 mb-2 text-[#0F172A]">Mastermind!</h1>
<p class="font-body-lg text-body-lg text-[#475569] mb-xl">You've conquered the final frontier of knowledge.</p>
<!-- Circular Progress -->
<div class="relative w-48 h-48 mb-lg flex items-center justify-center">
<svg class="w-full h-full absolute inset-0" viewbox="0 0 120 120">
<!-- Track -->
<circle class="text-slate-100" cx="60" cy="60" fill="transparent" r="54" stroke="currentColor" stroke-width="8"></circle>
<!-- Fill (95%) -->
<circle class="text-[#38BDF8] progress-ring__circle" cx="60" cy="60" fill="transparent" r="54" stroke="currentColor" stroke-dasharray="339.292" stroke-dashoffset="16.9646" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="flex flex-col items-center z-10">
<span class="font-display text-display text-[#0F172A]">95%</span>
<span class="font-label-md text-label-md text-[#475569] tracking-widest uppercase mt-1">Score</span>
</div>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-3 gap-md">
<!-- Stat Tile 1 -->
<div class="glass-card rounded-lg p-md flex flex-col items-center text-center justify-center">
<span class="material-symbols-outlined text-[#38BDF8] mb-sm text-h1" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-h2 text-h2 text-[#0F172A]">19/20</span>
<span class="font-label-sm text-label-sm text-[#475569] mt-xs">Correct</span>
</div>
<!-- Stat Tile 2 -->
<div class="glass-card rounded-lg p-md flex flex-col items-center text-center justify-center">
<span class="material-symbols-outlined text-[#38BDF8] mb-sm text-h1" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-h2 text-h2 text-[#0F172A]">4:12</span>
<span class="font-label-sm text-label-sm text-[#475569] mt-xs">Time</span>
</div>
<!-- Stat Tile 3 -->
<div class="glass-card rounded-lg p-md flex flex-col items-center text-center justify-center">
<span class="material-symbols-outlined text-[#38BDF8] mb-sm text-h1" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-h2 text-h2 text-[#0F172A]">5</span>
<span class="font-label-sm text-label-sm text-[#475569] mt-xs">Streak</span>
</div>
</div>
<!-- Visual Context / Related Images (Bento style integration) -->
<!-- Action Buttons -->
<div class="flex flex-col gap-sm mt-md">
<button class="w-full py-md rounded-lg bg-gradient-primary font-label-md text-label-md text-white btn-hover transition-all duration-300 ease-out flex items-center justify-center gap-sm font-bold uppercase tracking-wider">
<span>RETAKE QUIZ</span>
<span class="material-symbols-outlined text-[20px]">refresh</span>
</button>
<button class="w-full py-md rounded-lg border border-slate-200 font-label-md text-label-md text-[#0F172A] hover:bg-slate-50 transition-colors duration-300 ease-out flex items-center justify-center gap-sm uppercase tracking-wider">
<span>RETURN HOME</span>
</button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full flex flex-col md:flex-row justify-between items-center px-gutter gap-md max-w-7xl mx-auto py-lg border-t border-slate-200 bg-[#F8FAFC] mt-xl">
<div class="font-display text-label-md font-bold text-[#38BDF8]">
            Quizzer
        </div>
<div class="flex gap-lg">
<a class="text-slate-500 font-label-sm text-label-sm hover:text-[#38BDF8] transition-colors duration-300 ease-out" href="#">Privacy</a>
<a class="text-slate-500 font-label-sm text-label-sm hover:text-[#38BDF8] transition-colors duration-300 ease-out" href="#">Terms</a>
<a class="text-slate-500 font-label-sm text-label-sm hover:text-[#38BDF8] transition-colors duration-300 ease-out" href="#">Help Center</a>
</div>
<div class="text-slate-500 font-body-md text-body-md text-sm">
            © 2024 Quizzer. Elevating intellect.
        </div>
</footer>
</body></html>
