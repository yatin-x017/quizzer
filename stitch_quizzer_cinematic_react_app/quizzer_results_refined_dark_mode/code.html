<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quizzer - Mastermind Results</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed-dim": "#bec6e0",
                      "on-tertiary-container": "#3c4459",
                      "error": "#ffb4ab",
                      "on-background": "#dde3eb",
                      "on-secondary": "#00363e",
                      "inverse-surface": "#dde3eb",
                      "surface-dim": "#0e141a",
                      "on-secondary-container": "#90d9e7",
                      "on-secondary-fixed": "#001f25",
                      "surface": "#0e141a",
                      "primary-fixed": "#c4e7ff",
                      "tertiary-fixed": "#dae2fd",
                      "surface-container": "#1a2026",
                      "secondary": "#89d2e0",
                      "surface-container-lowest": "#080f14",
                      "on-error": "#690005",
                      "on-surface": "#dde3eb",
                      "outline": "#87929a",
                      "inverse-primary": "#00668a",
                      "secondary-fixed-dim": "#89d2e0",
                      "primary-fixed-dim": "#7bd0ff",
                      "primary": "#8ed5ff",
                      "surface-container-high": "#242b31",
                      "secondary-container": "#00606d",
                      "on-primary-fixed": "#001e2c",
                      "outline-variant": "#3e484f",
                      "inverse-on-surface": "#2b3137",
                      "surface-tint": "#7bd0ff",
                      "on-primary": "#00354a",
                      "background": "#0e141a",
                      "on-error-container": "#ffdad6",
                      "on-primary-fixed-variant": "#004c69",
                      "tertiary-container": "#a9b1ca",
                      "primary-container": "#38bdf8",
                      "surface-bright": "#333a40",
                      "error-container": "#93000a",
                      "surface-container-low": "#161c22",
                      "on-tertiary": "#283044",
                      "on-tertiary-fixed-variant": "#3f465c",
                      "surface-variant": "#2f353c",
                      "on-secondary-fixed-variant": "#004e59",
                      "on-tertiary-fixed": "#131b2e",
                      "tertiary": "#c5cce6",
                      "on-primary-container": "#004965",
                      "surface-container-highest": "#2f353c",
                      "secondary-fixed": "#a5eefd",
                      "on-surface-variant": "#bdc8d1"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "lg": "2rem",
                      "xl": "3rem",
                      "unit": "4px",
                      "md": "1.5rem",
                      "gutter": "24px",
                      "sm": "1rem",
                      "xs": "0.5rem",
                      "container-max": "1200px"
              },
              "fontFamily": {
                      "h1": ["Space Grotesk"],
                      "body-lg": ["Inter"],
                      "label-caps": ["Space Grotesk"],
                      "h3": ["Space Grotesk"],
                      "stat-value": ["Space Grotesk"],
                      "h2": ["Space Grotesk"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "h1": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                      "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                      "h3": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                      "stat-value": ["28px", { "lineHeight": "1", "fontWeight": "700" }],
                      "h2": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                      "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
              }
            }
          }
        }
    </script>
<style>
        .pulse-glow {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.6)); }
            50% { filter: drop-shadow(0 0 45px rgba(56, 189, 248, 0.9)); }
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container" style="background: linear-gradient(135deg, #0F172A, #111827);">
<!-- TopNavBar JSON Component -->
<header class="bg-surface/80 dark:bg-transparent backdrop-blur-md fixed top-0 w-full z-50 shadow-sm border-b-0">
<div class="flex justify-between items-center px-gutter h-16 max-w-container-max mx-auto border-b border-surface-container-low/50 dark:border-white/10">
<div class="flex items-center gap-sm">
<span class="text-headline-sm font-headline-sm text-primary dark:text-[#38bdf8] tracking-tight font-h3">Quizzer</span>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant font-medium hover:bg-primary-container/10 transition-colors duration-200 rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined">dark_mode</span>
</button>
<button class="text-on-surface-variant font-medium hover:bg-primary-container/10 transition-colors duration-200 rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas (Results) -->
<main class="flex-grow flex flex-col items-center justify-center pt-[120px] pb-xl px-gutter relative w-full">
<div class="relative z-10 flex flex-col items-center w-full max-w-container-max">
<!-- Headers -->
<div class="text-center mb-lg">
<h1 class="font-h1 text-h1 bg-gradient-to-r from-[#38bdf8] to-[#89d2e0] bg-clip-text text-transparent mb-unit drop-shadow-[0_4px_24px_rgba(56,189,248,0.2)]">
                    Mastermind!
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Module completed with exceptional precision.
                </p>
</div>
<!-- Central Score Circle -->
<div class="relative w-64 h-64 mb-lg flex items-center justify-center">
<!-- Outer Glow Backdrop -->
<div class="absolute inset-0 rounded-full bg-[#38bdf8]/20 blur-[50px]"></div>
<!-- SVG Ring -->
<svg class="w-full h-full -rotate-90 pulse-glow relative z-10" viewbox="0 0 100 100">
<!-- Background Track -->
<circle class="stroke-[rgba(255,255,255,0.05)]" cx="50" cy="50" fill="none" r="45" stroke-width="4"></circle>
<!-- Progress Track (95%) -->
<circle class="stroke-[#38bdf8]" cx="50" cy="50" fill="none" r="45" stroke-dasharray="282.7" stroke-dashoffset="14.1" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Inner Content -->
<div class="absolute inset-0 flex flex-col items-center justify-center rounded-full bg-[rgba(15,23,42,0.6)] backdrop-blur-sm border border-[rgba(255,255,255,0.05)] m-4 z-20">
<span class="font-stat-value text-[64px] leading-none text-[#38bdf8] drop-shadow-[0_0_25px_rgba(56,189,248,0.8)] font-bold tracking-tighter">95<span class="text-h3 text-[#38bdf8]">%</span></span>
<span class="font-label-caps text-label-caps text-secondary uppercase mt-unit tracking-widest opacity-90">Accuracy</span>
</div>
</div>
<!-- Glassmorphism Stat Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter w-full max-w-3xl mb-lg">
<!-- Stat 1 -->
<div class="relative group overflow-hidden rounded-xl bg-[rgba(30,41,59,0.85)] backdrop-blur-md border border-[rgba(255,255,255,0.08)] p-md flex flex-col items-center justify-center transition-all duration-300 hover:border-[#38bdf8]/50 hover:bg-[rgba(30,41,59,0.95)]">
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-[#38bdf8] mb-xs text-h3 drop-shadow-[0_0_10px_rgba(56,189,248,0.5)]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-stat-value text-stat-value text-white">19 <span class="text-body-md text-on-surface-variant font-normal">/ 20</span></span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-unit">Correct Answers</span>
</div>
</div>
<!-- Stat 2 -->
<div class="relative group overflow-hidden rounded-xl bg-[rgba(30,41,59,0.85)] backdrop-blur-md border border-[rgba(255,255,255,0.08)] p-md flex flex-col items-center justify-center transition-all duration-300 hover:border-[#38bdf8]/50 hover:bg-[rgba(30,41,59,0.95)] shadow-[0_8px_30px_rgba(0,0,0,0.5)]">
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-secondary mb-xs text-h3 drop-shadow-[0_0_10px_rgba(137,210,224,0.5)]" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-stat-value text-stat-value text-white">04:12</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-unit">Time Taken</span>
</div>
</div>
<!-- Stat 3 -->
<div class="relative group overflow-hidden rounded-xl bg-[rgba(30,41,59,0.85)] backdrop-blur-md border border-[rgba(255,255,255,0.08)] p-md flex flex-col items-center justify-center transition-all duration-300 hover:border-[#38bdf8]/50 hover:bg-[rgba(30,41,59,0.95)]">
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-[#38bdf8] mb-xs text-h3 drop-shadow-[0_0_10px_rgba(56,189,248,0.5)]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-stat-value text-stat-value text-white">5x</span>
<span class="font-label-caps text-label-caps text-on-surface-variant mt-unit">Perfect Streak</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-md items-center justify-center w-full max-w-md">
<button class="w-full sm:w-auto font-body-lg text-body-lg font-bold px-xl py-sm rounded-full bg-gradient-to-r from-[#38bdf8] to-[#0284c7] text-[#0f172a] shadow-[0_0_20px_rgba(56,189,248,0.4)] hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(56,189,248,0.6)] transition-all duration-300 flex items-center justify-center gap-xs border border-[#8ed5ff]/30">
<span class="material-symbols-outlined text-[20px]">replay</span>
                    Retake Quiz
                </button>
<button class="w-full sm:w-auto font-body-lg text-body-lg px-xl py-sm rounded-full bg-[rgba(30,41,59,0.5)] border border-[rgba(255,255,255,0.08)] text-white hover:bg-[rgba(30,41,59,0.8)] transition-colors duration-200 flex items-center justify-center gap-xs backdrop-blur-sm">
                    Return Home
                </button>
</div>
</div>
</main>
<!-- Footer JSON Component -->
<footer class="bg-transparent w-full py-8 border-t border-white/10 flex flex-col md:flex-row justify-between items-center px-gutter gap-4 relative z-10">
<div class="text-body-lg font-headline-sm text-white font-h3">
            Quizzer
        </div>
<nav class="flex flex-wrap items-center justify-center gap-md">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-[#38bdf8] transition-colors duration-200" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-[#38bdf8] transition-colors duration-200" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-[#38bdf8] transition-colors duration-200" href="#">Help Center</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-[#38bdf8] transition-colors duration-200" href="#">Contact</a>
</nav>
<div class="text-secondary dark:text-secondary-fixed font-label-md text-label-md font-body-md text-[12px]">
            © 2024 Quizzer Premium Education. All rights reserved.
        </div>
</footer>
</body></html>
