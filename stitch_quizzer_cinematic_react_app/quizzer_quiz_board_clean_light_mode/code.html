<header class="bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md full-width top-0 border-b border-outline-variant/20 dark:border-white/10 shadow-sm dark:shadow-2xl fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter py-md">
<div class="font-display-lg text-display-lg font-extrabold text-primary-container">
            Quizzer
        </div>
<div class="flex items-center gap-4">
<button aria-label="Toggle Dark Mode" class="p-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="dark_mode">dark_mode</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter md:p-margin-desktop w-full max-w-container-max mx-auto">

<div class="flex-1 w-full">
<div class="flex justify-between items-center mb-2">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Question 4 of 10</span>
<span class="font-label-md text-label-md text-primary font-bold">40%</span>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full progress-fill rounded-full" style="width: 40%;"></div>
</div>
</div>
<div class="flex items-center gap-2 bg-surface-container py-2 px-4 rounded-lg">
<span class="material-symbols-outlined text-tertiary-container" data-icon="timer">timer</span>
<span class="font-headline-sm text-headline-sm text-on-surface font-bold tracking-tight">02:45</span>
</div>
</div>
<!-- Question Area -->
<div class="flex flex-col gap-6">
<div class="flex gap-4 items-start">
<div class="w-12 h-12 rounded-lg bg-surface-container-low flex items-center justify-center shrink-0">

</div>
<h2 class="font-headline-md text-headline-md text-on-surface leading-tight">
                        In computer science, what is the time complexity of searching for an element in a balanced Binary Search Tree (BST)?
                    </h2>
</div>
<!-- Answer Options -->
<div class="flex flex-col gap-3 mt-4">
<button class="answer-card w-full text-left p-4 rounded-lg flex items-center gap-4 group focus:outline-none">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary-container shrink-0 text-on-surface-variant font-label-md">A</div>
<span class="font-body-lg text-body-lg text-on-surface">O(1)</span>
</button>
<button class="answer-card w-full text-left p-4 rounded-lg flex items-center gap-4 group focus:outline-none">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary-container shrink-0 text-on-surface-variant font-label-md">B</div>
<span class="font-body-lg text-body-lg text-on-surface">O(n)</span>
</button>
<button class="answer-card selected w-full text-left p-4 rounded-lg flex items-center gap-4 focus:outline-none">
<div class="w-8 h-8 rounded-full border-2 border-primary-container bg-primary-container text-on-primary flex items-center justify-center shrink-0 font-label-md">C</div>
<span class="font-body-lg text-body-lg text-on-surface font-semibold">O(log n)</span>
<span class="material-symbols-outlined ml-auto text-primary-container" data-icon="check_circle">check_circle</span>
</button>
<button class="answer-card w-full text-left p-4 rounded-lg flex items-center gap-4 group focus:outline-none">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary-container shrink-0 text-on-surface-variant font-label-md">D</div>
<span class="font-body-lg text-body-lg text-on-surface">O(n log n)</span>
</button>
</div>
</div>

<div class="flex justify-between items-center mt-6 pt-6 border-t border-outline-variant/20">
<button class="px-6 py-3 rounded-lg font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
